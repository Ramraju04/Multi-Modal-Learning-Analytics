{% extends "base.html" %}

{% block head_css %}
<style>
    .contact-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 80px;
    }

    .contact-card {
        background: var(--glass-surface);
        backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: var(--space-lg);
        width: 100%;
        max-width: 600px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .form-group {
        margin-bottom: var(--space-md);
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-secondary);
        font-size: 0.9rem;
    }

    .form-control {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 15px;
        color: white;
        font-family: inherit;
        transition: 0.3s;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--accent-glow);
        background: rgba(0, 0, 0, 0.5);
    }
</style>
{% endblock %}

{% block content %}
<section class="container contact-wrapper">
    <div class="contact-card">
        <h1 style="text-align: center; margin-bottom: 5px;">Get in Touch</h1>
        <p style="text-align: center; margin-bottom: 30px; font-size: 0.95rem;">
            Questions about the research? Collaboration inquiry?
        </p>

        <form>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="john@university.edu">
                </div>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea class="form-control" rows="5" placeholder="Tell us about your interest..."></textarea>
            </div>

            <button type="button" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>

        <div
            style="text-align: center; margin-top: 30px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <p style="font-size: 0.85rem; opacity: 0.7;">
                📍 Mohan Babu University, Tirupati, India<br>
                📧 contact@mmla-project.ai
            </p>
        </div>
    </div>
</section>
{% endblock %}
