{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2>Student Login</h2>
        <p>Access your personalized learning dashboard</p>

        <form action="{{ url_for('dashboard') }}" method="GET"> <!-- Direct to dashboard for demo -->
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="student@university.edu" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="#">Register here</a></p>
            <p class="note">Note: This is a demo. No real authentication required.</p>
        </div>
    </div>
</div>
{% endblock %}
